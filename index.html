<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>디지털 교무수첩</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="교무수첩">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Jua&display=swap" rel="stylesheet">
<style>@font-face{font-family:'OkDanDan';src:url('./OkDanDan-Bold.ttf') format('truetype');}</style>
<!-- SheetJS (Excel 내보내기) -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --paper:#faf8f2; --paper-line:rgba(180,200,220,0.55); --margin-line:rgba(210,120,120,0.5);
  --ink:#2c3e50; --ink-soft:#6b7a8a; --cover:#1c2340; --cover2:#16213e;
  --gold:#c9a84c; --gold-lt:#f0d080; --blue:#2a6db5; --green:#2e7d52;
  --tab-h:62px; --hdr-h:58px;
}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif}
body{background:var(--cover);color:var(--ink);display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;height:100%;}

/* ── 로그인 화면 ── */
#loginScreen{
  position:fixed;inset:0;background:linear-gradient(160deg,#1c2340 0%,#0f3460 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:1000;padding:30px;
}
.login-icon{font-size:72px;margin-bottom:16px}
.login-title{font-family:'Jua',sans-serif;font-size:28px;color:#f0e6c8;margin-bottom:6px;letter-spacing:2px}
.login-sub{font-size:13px;color:#8fa0b8;margin-bottom:48px}
.login-btn{
  display:flex;align-items:center;gap:12px;background:#fff;color:#3c4043;
  border:none;border-radius:12px;padding:14px 28px;font-size:16px;font-weight:500;
  cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.3);font-family:'Noto Sans KR',sans-serif;
  width:100%;max-width:300px;justify-content:center;
}
.login-btn img{width:24px;height:24px}
.login-btn:active{opacity:.8}

/* ── 로딩 ── */
#loadingScreen{
  position:fixed;inset:0;background:var(--cover);display:none;
  align-items:center;justify-content:center;z-index:900;flex-direction:column;gap:16px;
}
.spinner{width:40px;height:40px;border:3px solid rgba(201,168,76,0.3);
  border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loadingScreen p{color:#8fa0b8;font-size:13px}

/* ── 앱 ── */
#appScreen{display:none;flex-direction:column;height:100%}

/* ── HEADER ── */
.hdr{
  flex-shrink:0;height:var(--hdr-h);
  background: url('./texture.png') center/500px 707px repeat;
  border-bottom:3px solid #111;
  display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:10;
}
.hdr-title{font-family:'OkDanDan',cursive;font-size:20px;color:#fff;letter-spacing:1px;line-height:1.2;
  text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,0 0 6px rgba(0,0,0,0.8)}
.hdr-title small{display:block;font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:300;color:#fff;
  text-shadow:0 1px 2px #000}
.hdr-right{display:flex;align-items:center;gap:8px}
.user-photo{width:30px;height:30px;border-radius:50%;border:2px solid var(--gold);object-fit:cover}
.user-initials{width:30px;height:30px;border-radius:50%;border:2px solid var(--gold);
  background:var(--gold);color:var(--cover);font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center}
.signout-btn{background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.5);color:#fff;
  border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  text-shadow:0 1px 2px #000}

/* ── SPIRAL ── */
.spiral{flex-shrink:0;height:14px;background:#111;border-bottom:none}

/* ── CONTENT ── */
.content-wrap{flex:1;overflow:hidden;position:relative;background:var(--paper)}
.content-inner{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  background-image:
    linear-gradient(90deg,transparent 52px,var(--margin-line) 52px,var(--margin-line) 54px,transparent 54px),
    repeating-linear-gradient(transparent,transparent 29px,var(--paper-line) 29px,var(--paper-line) 30px);
  background-attachment:local;
}

/* ── SECTIONS ── */
.tab-sec{display:none;padding:14px 14px 24px 62px;animation:fadeUp .18s ease}
.tab-sec.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sec-title{font-family:'Jua',sans-serif;font-size:21px;color:var(--cover);
  margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid var(--cover);margin-top:4px}

/* ── SYNC 표시 ── */
.sync-badge{
  font-size:10px;color:#8fa0b8;display:flex;align-items:center;gap:4px;
  margin-bottom:8px;
}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4caf50}
.sync-dot.syncing{background:var(--gold);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── BOTTOM NAV ── */
.bot-nav{flex-shrink:0;height:var(--tab-h);background:#111;
  border-top:2px solid var(--gold);display:flex;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;background:none;border:none;color:#6b7a90;font-family:'Noto Sans KR',sans-serif;
  font-size:8px;font-weight:500;cursor:pointer;padding:4px 1px;transition:color .15s}
.nav-btn.active{color:var(--gold-lt)}
.nav-btn .ni{font-size:16px;line-height:1}

/* ── CALENDAR ── */
.cal-info{background:#fffdf0;border:1px solid #e8d070;border-radius:8px;padding:14px;
  margin-bottom:12px;font-size:13px;color:#7a6000;line-height:1.6}
.cal-info strong{display:block;margin-bottom:6px;font-size:14px}
.cal-id-row{display:flex;gap:6px;margin-top:8px}
.cal-id-row input{flex:1;padding:8px 10px;border:1px solid #c8c0a0;border-radius:6px;
  font-size:13px;font-family:'Noto Sans KR',sans-serif;background:#fff}
.btn-primary{padding:8px 14px;background:var(--cover);color:#fff;border:none;
  border-radius:6px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap}
#calFrame iframe{width:100%;height:calc(100vh - 210px);border:none;border-radius:8px}

/* ── TODO ── */
.todo-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.todo-row input[type=text]{flex:1;min-width:120px;padding:9px 11px;border:1px solid #c8d0d8;
  border-radius:6px;font-size:14px;font-family:'Noto Sans KR',sans-serif;background:#fff}
.todo-row input[type=date]{width:138px;padding:9px 8px;border:1px solid #c8d0d8;border-radius:6px;font-size:12px}
.btn-plus{width:40px;height:40px;background:var(--cover);color:#fff;border:none;
  border-radius:6px;font-size:22px;cursor:pointer;line-height:1;flex-shrink:0}
.todo-filters{display:flex;gap:6px;margin-bottom:12px}
.f-btn{padding:5px 12px;border-radius:20px;border:1px solid #c0c8d0;background:#fff;
  cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--ink-soft)}
.f-btn.on{background:var(--cover);color:#fff;border-color:var(--cover)}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--paper-line)}
.todo-item input[type=checkbox]{width:17px;height:17px;margin-top:3px;accent-color:var(--cover);cursor:pointer}
.todo-body{flex:1}
.todo-txt{font-size:14px;color:var(--ink);line-height:1.4}
.todo-item.done .todo-txt{text-decoration:line-through;color:#aaa}
.todo-dt{font-size:11px;color:var(--ink-soft);margin-top:2px}
.todo-del{background:none;border:none;color:#ccc;font-size:17px;cursor:pointer;padding:0 4px;margin-top:1px}

/* ── OBSERVATION ── */
.obs-add-btn{width:100%;padding:11px;background:var(--cover);color:#fff;border:none;
  border-radius:8px;font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:14px}
.obs-sort-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.obs-sort-row label{font-size:12px;color:var(--ink-soft)}
.obs-sort-row select{padding:5px 8px;border:1px solid #c8d0d8;border-radius:6px;
  font-size:12px;font-family:'Noto Sans KR',sans-serif}
.obs-card{background:#fff;border-radius:8px;padding:12px;margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.09);border-left:4px solid var(--blue)}
.obs-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.obs-name{font-weight:700;font-size:15px;color:var(--cover)}
.obs-date-lbl{font-size:11px;color:var(--ink-soft)}
.obs-memo{font-size:13px;color:var(--ink);line-height:1.65;white-space:pre-wrap}
.obs-photo{width:100%;max-height:200px;object-fit:cover;border-radius:6px;margin-top:8px}
.obs-acts{display:flex;gap:6px;margin-top:8px}
.btn-edit-sm{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-size:12px;
  font-family:'Noto Sans KR',sans-serif;background:#e8f0fe;color:#1a6be8}
.btn-del-sm{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-size:12px;
  font-family:'Noto Sans KR',sans-serif;background:#fce8e6;color:#c0392b}

/* ── CHECKLIST ── */
.chk-toolbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.chk-toolbar button{padding:7px 11px;border:none;border-radius:6px;cursor:pointer;
  font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:500}
.chk-btn-blue{background:#1c2340;color:#fff}
.chk-btn-gray{background:#e8eaed;color:#444}
.chk-btn-red{background:#fce8e6;color:#c0392b}
.chk-wrap{overflow:auto;-webkit-overflow-scrolling:touch;border-radius:8px;
  box-shadow:0 1px 4px rgba(0,0,0,0.1);
  max-height:calc(100vh - var(--hdr-h) - var(--tab-h) - 130px)}
.chk-table{border-collapse:collapse;background:#fff;table-layout:fixed;width:max-content}
.chk-table td{border:1px solid #dde2ea;padding:0;text-align:center;overflow:hidden}
.chk-table th{border:1px solid #4a5568;padding:0;text-align:center}
.chk-table thead th{background:#1c2340;color:#f0e6c8;font-size:10px;font-weight:600;
  position:sticky;top:0;z-index:2;width:28px}
.chk-table thead th:first-child{background:#16213e;position:sticky;left:0;z-index:3;width:42px}
.chk-table tbody td:first-child{background:#f5f7fa;font-size:11px;font-weight:600;color:#2c3e50;
  padding:3px 4px;word-break:keep-all;width:42px;position:sticky;left:0;z-index:1;
  border-right:2px solid #c0c8d8;line-height:1.3}
.chk-table tbody tr:nth-child(even) td:first-child{background:#edf0f5}
.chk-cell{width:28px;height:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;transition:background .1s;font-family:'Noto Sans KR',sans-serif}
.chk-cell:active{opacity:.7}
.chk-cell[data-v="O"]{background:#e8f5e9;color:#2e7d52}
.chk-cell[data-v="X"]{background:#fce8e6;color:#c0392b}
.chk-cell[data-v=""]{background:#fff}
.chk-cell.etc{background:#fff8e1;color:#e65100;font-size:7px;line-height:1.1;word-break:break-all;padding:1px;height:24px}
.chk-head-span{display:block;font-size:9px;line-height:1.3;white-space:normal;word-break:break-all;
  padding:3px 2px;text-align:center;width:28px;box-sizing:border-box}
.chk-popup{display:none;position:fixed;z-index:500;background:#fff;border-radius:10px;
  box-shadow:0 4px 20px rgba(0,0,0,0.25);padding:10px;flex-direction:column;gap:6px;min-width:120px}
.chk-popup.show{display:flex}
.chk-popup button{padding:8px 0;border:none;border-radius:6px;cursor:pointer;
  font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif}
.chk-pop-o{background:#e8f5e9;color:#2e7d52}
.chk-pop-x{background:#fce8e6;color:#c0392b}
.chk-pop-etc{background:#fff8e1;color:#e65100}
.chk-pop-clr{background:#f0f0f0;color:#888;font-size:13px;font-weight:400}
.del-list{max-height:200px;overflow-y:auto;border:1px solid #e0e4ea;border-radius:6px;padding:6px 0;margin-bottom:4px}
.del-list label{display:flex;align-items:center;gap:10px;padding:7px 12px;font-size:13px;cursor:pointer}
.del-list label:hover{background:#f5f7fa}
.del-list input[type=checkbox]{width:16px;height:16px;accent-color:#c0392b;flex-shrink:0}
.del-section-title{font-size:12px;font-weight:600;color:#5a6a7a;margin:10px 0 4px}

/* ── CONTACTS ── */
.search-box{width:100%;padding:9px 12px;border:1px solid #c8d0d8;border-radius:6px;
  font-size:14px;font-family:'Noto Sans KR',sans-serif;background:#fff;margin-bottom:10px}
.contact-add-btn{width:100%;padding:9px;background:var(--cover);color:#fff;border:none;
  border-radius:6px;font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:14px}
.c-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--paper-line);flex-wrap:wrap}
.c-avatar{width:38px;height:38px;border-radius:50%;background:var(--cover);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.c-info{flex:1;min-width:80px}
.c-name{font-weight:600;font-size:14px;color:var(--ink)}
.c-role{font-size:11px;color:var(--ink-soft)}
.call-btn{display:inline-flex;align-items:center;gap:3px;background:#e8f5e9;color:#2e7d32;
  padding:5px 10px;border-radius:16px;text-decoration:none;font-size:12px;font-weight:500;
  border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap}
.call-btn.blue{background:#e3f2fd;color:#1565c0}
.c-actions{display:flex;gap:4px;flex-shrink:0}
.ic-btn{background:none;border:none;color:#bbb;cursor:pointer;font-size:15px;padding:3px 5px}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;
  align-items:center;justify-content:center;padding:12px}
.overlay.show{display:flex}
.modal{background:var(--paper);
  background-image:repeating-linear-gradient(transparent,transparent 29px,var(--paper-line) 29px,var(--paper-line) 30px);
  border-radius:12px;padding:20px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto}
.modal-title{font-family:'Jua',sans-serif;font-size:18px;color:var(--cover);margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:3px}
.fg input,.fg textarea,.fg select{width:100%;padding:9px 11px;border:1px solid #c8d0d8;border-radius:6px;
  font-size:14px;font-family:'Noto Sans KR',sans-serif;background:#fff}
.fg textarea{height:90px;resize:vertical}
.photo-zone{border:2px dashed #c0ccd8;border-radius:8px;padding:18px;text-align:center;cursor:pointer;background:#fff}
.photo-zone img{max-width:100%;max-height:140px;border-radius:6px}
.photo-zone p{color:var(--ink-soft);font-size:13px}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.btn-save{flex:1;padding:11px;background:var(--cover);color:#fff;border:none;border-radius:8px;
  font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer}
.btn-cancel{flex:1;padding:11px;background:#e8e8e8;color:var(--ink);border:none;border-radius:8px;
  font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 10px;color:var(--ink-soft)}
.empty .ei{font-size:44px;margin-bottom:10px}
.empty p{font-size:13px}

@media(max-width:360px){.nav-btn{font-size:7px}.nav-btn .ni{font-size:14px}}

/* ── EXPORT ── */
.export-row{display:flex;gap:6px;margin-bottom:12px}
.btn-xl{padding:7px 11px;background:#217346;color:#fff;border:none;border-radius:6px;
  font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;gap:4px}
.btn-wd{padding:7px 11px;background:#2b579a;color:#fff;border:none;border-radius:6px;
  font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;gap:4px}
.btn-xl:active,.btn-wd:active{opacity:.8}

/* ── NOTE ── */
.note-add-btn{width:100%;padding:11px;background:var(--cover);color:#fff;border:none;
  border-radius:8px;font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:14px}
.note-card{background:#fff;border-radius:8px;padding:12px;margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.09);border-left:4px solid var(--gold)}
.note-card-title{font-weight:700;font-size:14px;color:var(--cover);margin-bottom:4px}
.note-card-body{font-size:13px;color:var(--ink);line-height:1.65;white-space:pre-wrap}
.note-card-date{font-size:11px;color:var(--ink-soft);margin-top:6px}
.note-acts{display:flex;gap:6px;margin-top:8px}

/* ── PARENT CONSULT ── */
.pc-add-btn{width:100%;padding:11px;background:var(--cover);color:#fff;border:none;
  border-radius:8px;font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:14px}
.pc-card{background:#fff;border-radius:8px;padding:12px;margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.09);border-left:4px solid var(--green)}
.pc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pc-name{font-weight:700;font-size:15px;color:var(--cover)}
.pc-date-lbl{font-size:11px;color:var(--ink-soft)}
.pc-memo{font-size:13px;color:var(--ink);line-height:1.65;white-space:pre-wrap}
.pc-acts{display:flex;gap:6px;margin-top:8px}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginScreen">
  <div class="login-icon">📓</div>
  <div class="login-title">디지털 교무수첩</div>
  <div class="login-sub">구글 계정으로 로그인하면<br>모든 기기에서 데이터가 동기화됩니다</div>
  <button class="login-btn" onclick="signIn()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Google 계정으로 로그인
  </button>
</div>

<!-- 로딩 화면 -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <p>데이터 불러오는 중...</p>
</div>

<!-- 앱 본체 -->
<div id="appScreen">

  <header class="hdr">
    <div class="hdr-title">📓 디지털 교무수첩<small id="yearLabel"></small></div>
    <div class="hdr-right">
      <div id="userAvatar" class="user-initials">?</div>
      <button class="signout-btn" onclick="signOut()">로그아웃</button>
    </div>
  </header>

  <div class="spiral"></div>

  <div class="content-wrap">
  <div class="content-inner">

    <!-- ① 학사일정 -->
    <section id="sec-cal" class="tab-sec active">
      <h2 class="sec-title">📅 학사일정</h2>
      <div class="cal-info" id="calSetupBox">
        <strong>📌 구글 캘린더 연결 설정</strong>
        Google Calendar에서 <b>'방학유 학사일정'</b> 캘린더를 공개 설정한 후,<br>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAFiWvWeNlawyleSZxTQtdQbVpmnD9RZ-4",
  authDomain: "gyomususp.firebaseapp.com",
  projectId: "gyomususp",
  storageBucket: "gyomususp.firebasestorage.app",
  messagingSenderId: "1020666206779",
  appId: "1:1020666206779:web:88139bdcba69e12ac35a1e",
  measurementId: "G-2M819L5JQZ"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

db.enablePersistence({ synchronizeTabs: true }).catch(function(){});

var uid = null;
var todos = [], obs = [], staff = [], studs = [], notes = [], parentConsults = [];
var chkData = { students:[], items:[], cells:{} };
var curFilter = 'all', chkTarget = null;
var unsubscribers = [];

function signIn() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(e) {
    if(e.code === 'auth/popup-blocked') auth.signInWithRedirect(provider);
  });
}
function signOut() {
  if(!confirm('로그아웃하시겠습니까?')) return;
  unsubscribers.forEach(function(fn){ fn(); });
  unsubscribers = [];
  auth.signOut();
}

auth.onAuthStateChanged(function(user) {
  if(user) {
    uid = user.uid;
    var av = document.getElementById('userAvatar');
    if(user.photoURL) {
      av.outerHTML = '<img id="userAvatar" class="user-photo" src="'+user.photoURL+'">';
    } else {
      av.textContent = (user.displayName||'?').charAt(0);
    }
    showLoading();
    setupListeners();
  } else {
    uid = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'none';
  }
});

function showLoading() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('loadingScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
}
function showApp() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  var yr = new Date().getFullYear();
  document.getElementById('yearLabel').textContent = yr + '학년도';
  document.getElementById('todoDt').value = todayStr();
}

var appReady = false;
var loadCount = 0;
var TOTAL_DOCS = 6;

function onDocLoaded() {
  loadCount++;
  if(loadCount >= TOTAL_DOCS && !appReady) {
    appReady = true;
    showApp();
    renderTodos(); renderObs(); renderChk(); renderStaff(); renderStudents(); renderNotes(); renderParents();
  }
}

function setupListeners() {
  loadCount = 0; appReady = false;
  function uref(path) { return db.doc('users/'+uid+'/'+path); }
  function ucol(path) { return db.collection('users/'+uid+'/'+path); }

  unsubscribers.push(uref('data/todos').onSnapshot(function(snap) {
    todos = snap.exists ? (snap.data().items || []) : [];
    if(appReady) renderTodos();
    onDocLoaded();
  }));
  unsubscribers.push(uref('data/staff').onSnapshot(function(snap) {
    staff = snap.exists ? (snap.data().items || []) : [];
    if(appReady) renderStaff();
    onDocLoaded();
  }));
  unsubscribers.push(uref('data/students').onSnapshot(function(snap) {
    studs = snap.exists ? (snap.data().items || []) : [];
    if(appReady) renderStudents();
    onDocLoaded();
  }));
  unsubscribers.push(uref('data/checklist').onSnapshot(function(snap) {
    if(snap.exists) {
      chkData = snap.data();
      chkData.cells = chkData.cells || {};
    } else {
      chkData = { students:[], items:[], cells:{} };
    }
    if(appReady) renderChk();
    onDocLoaded();
  }));
  unsubscribers.push(uref('data/settings').onSnapshot(function(snap) {
    if(snap.exists && snap.data().calId) {
      var calId = snap.data().calId;
      document.getElementById('calIdInput').value = calId;
      buildCalFrame(calId);
      document.getElementById('calSetupBox').style.display = 'none';
    }
    onDocLoaded();
  }));
  unsubscribers.push(uref('data/notes').onSnapshot(function(snap) {
    notes = snap.exists ? (snap.data().items || []) : [];
    if(appReady) renderNotes();
    onDocLoaded();
  }));
  unsubscribers.push(ucol('observations').onSnapshot(function(snap) {
    obs = snap.docs.map(function(d){ return Object.assign({id: d.id}, d.data()); });
    if(appReady) renderObs();
  }));
  unsubscribers.push(ucol('parentConsults').onSnapshot(function(snap) {
    parentConsults = snap.docs.map(function(d){ return Object.assign({id: d.id}, d.data()); });
    if(appReady) renderParents();
  }));
}

function uref(path) { return db.doc('users/'+uid+'/'+path); }
function ucol(path) { return db.collection('users/'+uid+'/'+path); }
function saveTodos()    { uref('data/todos').set({items: todos}); }
function saveStaff()    { uref('data/staff').set({items: staff}); }
function saveStudents() { uref('data/students').set({items: studs}); }
function saveChk()      { uref('data/checklist').set(chkData); }
function saveNotes()    { uref('data/notes').set({items: notes}); }

function goTab(id, btn) {
  document.querySelectorAll('.tab-sec').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('sec-'+id).classList.add('active');
  btn.classList.add('active');
  document.querySelector('.content-inner').scrollTop = 0;
}

function applyCalendar() {
  var id = document.getElementById('calIdInput').value.trim();
  if(!id){ alert('캘린더 ID를 입력해주세요.'); return; }
  buildCalFrame(id);
  uref('data/settings').set({calId: id}, {merge: true});
  document.getElementById('calSetupBox').style.display = 'none';
}
function buildCalFrame(id) {
  var url = 'https://calendar.google.com/calendar/embed?src='+encodeURIComponent(id)+
    '&ctz=Asia%2FSeoul&hl=ko&mode=MONTH&showTitle=0&showNav=1&showPrint=0&showTabs=0&showCalendars=0';
  document.getElementById('calFrame').innerHTML =
    '<iframe src="'+url+'" style="width:100%;height:calc(100vh - 210px);border:none;border-radius:8px;"></iframe>';
}

function addTodo() {
  var txt = document.getElementById('todoTxt').value.trim();
  if(!txt) return;
  todos.unshift({ id: Date.now(), txt:txt, dt:document.getElementById('todoDt').value, done:false });
  document.getElementById('todoTxt').value = '';
  saveTodos();
}
document.getElementById('todoTxt').addEventListener('keypress', function(e){ if(e.key==='Enter') addTodo(); });

function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('.f-btn').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  renderTodos();
}
function toggleTodo(id) {
  todos = todos.map(function(t){ return t.id===id ? Object.assign({},t,{done:!t.done}) : t; });
  saveTodos();
}
function deleteTodo(id) {
  todos = todos.filter(function(t){ return t.id!==id; });
  saveTodos();
}
function renderTodos() {
  var list = document.getElementById('todoList');
  var filtered = todos.filter(function(t){
    if(curFilter==='pending') return !t.done;
    if(curFilter==='done')    return t.done;
    return true;
  });
  if(!filtered.length){ list.innerHTML='<div class="empty"><div class="ei">✅</div><p>할 일이 없습니다.</p></div>'; return; }
  list.innerHTML = filtered.map(function(t){
    return '<div class="todo-item'+(t.done?' done':'')+'">'+
      '<input type="checkbox"'+(t.done?' checked':'')+' onchange="toggleTodo('+t.id+')">'+
      '<div class="todo-body"><div class="todo-txt">'+esc(t.txt)+'</div>'+
      (t.dt?'<div class="todo-dt">📅 '+t.dt+'</div>':'')+
      '</div><button class="todo-del" onclick="deleteTodo('+t.id+')">✕</button></div>';
  }).join('');
}

function openObsModal(id) {
  document.getElementById('obsEditId').value = id || '';
  if(id) {
    var o = obs.find(function(x){ return x.id===id; });
    if(!o) return;
    document.getElementById('obsName').value = o.name;
    document.getElementById('obsDate').value = o.date;
    document.getElementById('obsMemo').value = o.memo;
    setPhotoPreview(o.photo);
  } else {
    document.getElementById('obsName').value = '';
    document.getElementById('obsDate').value = todayStr();
    document.getElementById('obsMemo').value = '';
    setPhotoPreview('');
  }
  document.getElementById('obsOverlay').classList.add('show');
}
function setPhotoPreview(src) {
  var img=document.getElementById('obsPhotoPreview'), hint=document.getElementById('obsPhotoHint');
  var btns=document.querySelector('.photo-zone div');
  if(src){ img.src=src; img.style.display='block'; hint.style.display='none'; if(btns) btns.style.display='none'; }
  else   { img.src='';  img.style.display='none';  hint.style.display='block'; if(btns) btns.style.display='flex'; }
}
function loadPhoto(input) {
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas=document.createElement('canvas'), MAX=900, w=img.width, h=img.height;
      if(w>MAX){ h=h*MAX/w; w=MAX; }
      if(h>MAX){ w=w*MAX/h; h=MAX; }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      setPhotoPreview(canvas.toDataURL('image/jpeg',0.75));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function saveObs() {
  var name  = document.getElementById('obsName').value.trim();
  var date  = document.getElementById('obsDate').value;
  var memo  = document.getElementById('obsMemo').value.trim();
  var photo = document.getElementById('obsPhotoPreview').style.display!=='none'
              ? document.getElementById('obsPhotoPreview').src : '';
  var eid   = document.getElementById('obsEditId').value;
  if(!name){ alert('학생 이름을 입력해주세요.'); return; }
  if(!date){ alert('날짜를 선택해주세요.'); return; }
  var data = { name:name, date:date, memo:memo, photo:photo, updatedAt: new Date().toISOString() };
  var col = ucol('observations');
  if(eid) col.doc(eid).set(data);
  else    col.add(Object.assign(data, { createdAt: new Date().toISOString() }));
  closeOverlay('obsOverlay');
}
function deleteObs(id) {
  if(!confirm('이 관찰 기록을 삭제하시겠습니까?')) return;
  ucol('observations').doc(id).delete();
}
function renderObs() {
  var list = document.getElementById('obsList');
  var sort = document.getElementById('obsSort').value;
  var sorted = obs.slice().sort(function(a,b){
    if(sort==='d-desc') return b.date.localeCompare(a.date);
    if(sort==='d-asc')  return a.date.localeCompare(b.date);
    if(sort==='n-asc')  return a.name.localeCompare(b.name,'ko');
    if(sort==='n-desc') return b.name.localeCompare(a.name,'ko');
    return 0;
  });
  if(!sorted.length){ list.innerHTML='<div class="empty"><div class="ei">👁️</div><p>관찰 기록이 없습니다.</p></div>'; return; }
  list.innerHTML = sorted.map(function(o){
    return '<div class="obs-card">'+
      '<div class="obs-hdr"><span class="obs-name">👤 '+esc(o.name)+'</span><span class="obs-date-lbl">'+o.date+'</span></div>'+
      (o.memo?'<div class="obs-memo">'+esc(o.memo)+'</div>':'')+
      (o.photo?'<img class="obs-photo" src="'+o.photo+'" alt="">':'')+
      '<div class="obs-acts">'+
        '<button class="btn-edit-sm" onclick="openObsModal(\''+o.id+'\')">✏️ 수정</button>'+
        '<button class="btn-del-sm" onclick="deleteObs(\''+o.id+'\')">🗑️ 삭제</button>'+
      '</div></div>';
  }).join('');
}

function chkAddStudent() {
  var raw = prompt('학생 이름 입력 (여러 명은 쉼표로 구분):');
  if(!raw||!raw.trim()) return;
  raw.split(/[,\n]/).forEach(function(n){ n=n.trim(); if(n) chkData.students.push({id:Date.now()+Math.random(),name:n}); });
  saveChk();
}
function chkAddItem() {
  var raw = prompt('항목 이름 입력 (여러 개는 쉼표로 구분):');
  if(!raw||!raw.trim()) return;
  raw.split(/[,\n]/).forEach(function(n){ n=n.trim(); if(n) chkData.items.push({id:Date.now()+Math.random(),label:n}); });
  saveChk();
}
function chkOpenDelModal() {
  var sl=document.getElementById('chkDelStudentList'), il=document.getElementById('chkDelItemList');
  sl.innerHTML = chkData.students.length
    ? chkData.students.map(function(s){ return '<label><input type="checkbox" data-sid="'+s.id+'"> '+esc(s.name)+'</label>'; }).join('')
    : '<p style="padding:8px 12px;color:#aaa;font-size:13px;">학생이 없습니다.</p>';
  il.innerHTML = chkData.items.length
    ? chkData.items.map(function(i){ return '<label><input type="checkbox" data-iid="'+i.id+'"> '+esc(i.label)+'</label>'; }).join('')
    : '<p style="padding:8px 12px;color:#aaa;font-size:13px;">항목이 없습니다.</p>';
  document.getElementById('chkDelOverlay').classList.add('show');
}
function chkConfirmDelete() {
  var sids=Array.from(document.querySelectorAll('#chkDelStudentList input:checked')).map(function(el){ return el.dataset.sid; });
  var iids=Array.from(document.querySelectorAll('#chkDelItemList input:checked')).map(function(el){ return el.dataset.iid; });
  if(!sids.length&&!iids.length){ alert('삭제할 항목을 선택해주세요.'); return; }
  var msg=[];
  if(sids.length) msg.push('학생 '+sids.length+'명');
  if(iids.length) msg.push('항목 '+iids.length+'개');
  if(!confirm(msg.join(', ')+'을(를) 삭제하시겠습니까?')) return;
  sids.forEach(function(sid){
    chkData.students=chkData.students.filter(function(s){ return s.id!=sid; });
    Object.keys(chkData.cells).forEach(function(k){ if(k.split('_')[0]==sid) delete chkData.cells[k]; });
  });
  iids.forEach(function(iid){
    chkData.items=chkData.items.filter(function(i){ return i.id!=iid; });
    Object.keys(chkData.cells).forEach(function(k){ if(k.split('_')[1]==iid) delete chkData.cells[k]; });
  });
  saveChk(); closeOverlay('chkDelOverlay');
}
function chkResetChecks() {
  if(!confirm('모든 O/X 기록을 초기화하시겠습니까?')) return;
  chkData.cells={}; saveChk();
}
function chkOpenPopup(sid, iid, cellEl) {
  chkTarget={sid:sid, iid:iid};
  var popup=document.getElementById('chkPopup');
  popup.classList.add('show');
  var rect=cellEl.getBoundingClientRect(), pw=130, ph=170;
  var left=Math.min(rect.left, window.innerWidth-pw-8);
  var top=rect.bottom+4;
  if(top+ph>window.innerHeight) top=rect.top-ph-4;
  popup.style.left=left+'px'; popup.style.top=top+'px';
}
function chkApply(val) {
  if(!chkTarget) return;
  var key=chkTarget.sid+'_'+chkTarget.iid;
  if(val==='') delete chkData.cells[key]; else chkData.cells[key]=val;
  chkTarget=null; document.getElementById('chkPopup').classList.remove('show');
  saveChk();
}
function chkApplyEtc() {
  var txt=prompt('기타 내용을 입력하세요:');
  if(txt===null) return;
  chkApply(txt.trim()||'기타');
}
function renderChk() {
  var tbl=document.getElementById('chkTable'), ss=chkData.students, its=chkData.items;
  if(!ss.length&&!its.length){
    tbl.innerHTML='<tr><td colspan="99" style="padding:40px;text-align:center;color:#aaa;font-size:13px">학생과 항목을 추가하세요.</td></tr>';
    return;
  }
  var html='<thead><tr><th style="position:sticky;left:0;z-index:3;background:#16213e;width:42px;">이름</th>';
  its.forEach(function(it){ html+='<th style="width:28px;"><span class="chk-head-span">'+esc(it.label)+'</span></th>'; });
  html+='</tr></thead><tbody>';
  ss.forEach(function(s){
    html+='<tr><td>'+esc(s.name)+'</td>';
    its.forEach(function(it){
      var key=s.id+'_'+it.id, val=chkData.cells[key]||'';
      var isOX=(val==='O'||val==='X'||val==='');
      html+='<td><div class="'+(isOX?'chk-cell':'chk-cell etc')+'" data-v="'+esc(val)+'" onclick="chkOpenPopup('+s.id+','+it.id+',this)">'+esc(val)+'</div></td>';
    });
    html+='</tr>';
  });
  tbl.innerHTML=html+'</tbody>';
}
document.addEventListener('click', function(e){
  var popup=document.getElementById('chkPopup');
  if(popup.classList.contains('show')&&!popup.contains(e.target)&&!e.target.closest('.chk-cell')){
    popup.classList.remove('show'); chkTarget=null;
  }
});

function openContactModal(type, id) {
  document.getElementById('contactType').value=type;
  document.getElementById('contactEditId').value=id||'';
  var isStu=(type==='student');
  document.getElementById('contactModalTitle').textContent=isStu?'학생 추가/수정':'교직원 추가/수정';
  document.getElementById('cRoleLbl').textContent=isStu?'번호 / 반':'직책 / 담당';
  document.getElementById('cRole').placeholder=isStu?'예: 3반 12번':'예: 3학년부장';
  document.getElementById('cPhoneLbl').textContent=isStu?'학생 전화번호':'전화번호';
  document.getElementById('cParentGrp').style.display=isStu?'':'none';
  document.getElementById('cParentPhGrp').style.display=isStu?'':'none';
  if(id){
    var arr=isStu?studs:staff, c=arr.find(function(x){ return x.id===id; });
    if(c){ document.getElementById('cName').value=c.name||''; document.getElementById('cRole').value=c.role||'';
      document.getElementById('cPhone').value=c.phone||''; document.getElementById('cParent').value=c.parent||'';
      document.getElementById('cParentPh').value=c.parentPh||''; }
  } else {
    ['cName','cRole','cPhone','cParent','cParentPh'].forEach(function(id){ document.getElementById(id).value=''; });
  }
  document.getElementById('contactOverlay').classList.add('show');
}
function saveContact() {
  var type=document.getElementById('contactType').value, eid=document.getElementById('contactEditId').value;
  var name=document.getElementById('cName').value.trim();
  if(!name){ alert('이름을 입력해주세요.'); return; }
  var entry={id:eid?Number(eid):Date.now(), name:name, role:document.getElementById('cRole').value.trim(),
    phone:document.getElementById('cPhone').value.trim(), parent:document.getElementById('cParent').value.trim(),
    parentPh:document.getElementById('cParentPh').value.trim()};
  if(type==='staff'){
    if(eid) staff=staff.map(function(c){ return c.id==eid?entry:c; }); else staff.push(entry);
    staff.sort(function(a,b){ return a.name.localeCompare(b.name,'ko'); });
    saveStaff();
  } else {
    if(eid) studs=studs.map(function(c){ return c.id==eid?entry:c; }); else studs.push(entry);
    studs.sort(function(a,b){ return a.name.localeCompare(b.name,'ko'); });
    saveStudents();
  }
  closeOverlay('contactOverlay');
}
function deleteContact(type, id) {
  if(!confirm('이 연락처를 삭제하시겠습니까?')) return;
  if(type==='staff'){ staff=staff.filter(function(c){ return c.id!==id; }); saveStaff(); }
  else { studs=studs.filter(function(c){ return c.id!==id; }); saveStudents(); }
}

      '<button class="ic-btn" onclick="deleteContact(\'staff\','+c.id+')" style="color:#e57373">🗑️</button></div></div>';

function openNoteModal(id) {
  document.getElementById('noteEditId').value = id || '';
  if(id) {
    var n = notes.find(function(x){ return x.id===id; });
    if(!n) return;
    document.getElementById('noteTitle').value = n.title || '';
    document.getElementById('noteContent').value = n.content || '';
  } else {
    document.getElementById('noteTitle').value = '';
    document.getElementById('noteContent').value = '';
  }
  document.getElementById('noteOverlay').classList.add('show');
}
function saveNote() {
  var content = document.getElementById('noteContent').value.trim();
  if(!content){ alert('내용을 입력해주세요.'); return; }
  var eid = document.getElementById('noteEditId').value;
  var entry = {
    id: eid ? Number(eid) : Date.now(),
    title: document.getElementById('noteTitle').value.trim(),
    content: content,
    updatedAt: new Date().toISOString()
  };
  if(eid) {
    notes = notes.map(function(n){ return n.id==eid ? entry : n; });
  } else {
    entry.createdAt = entry.updatedAt;
    notes.unshift(entry);
  }
  saveNotes();
  closeOverlay('noteOverlay');
}
function deleteNote(id) {
  if(!confirm('이 노트를 삭제하시겠습니까?')) return;
  notes = notes.filter(function(n){ return n.id!==id; });
  saveNotes();
}
function renderNotes() {
  var list = document.getElementById('noteList');
  if(!list) return;
  if(!notes.length){ list.innerHTML='<div class="empty"><div class="ei">📝</div><p>노트가 없습니다.</p></div>'; return; }
  list.innerHTML = notes.map(function(n){
    return '<div class="note-card">'+
      (n.title?'<div class="note-card-title">'+esc(n.title)+'</div>':'')+
      '<div class="note-card-body">'+esc(n.content)+'</div>'+
      '<div class="note-card-date">'+(n.updatedAt?n.updatedAt.slice(0,10):'')+'</div>'+
      '<div class="note-acts">'+
        '<button class="btn-edit-sm" onclick="openNoteModal('+n.id+')">✏️ 수정</button>'+
        '<button class="btn-del-sm" onclick="deleteNote('+n.id+')">🗑️ 삭제</button>'+
      '</div></div>';
  }).join('');
}

function exportExcel(type) {
  var wb = XLSX.utils.book_new();
  var rows, sheetName, fileName;

  if(type === 'obs') {
    if(!obs.length){ alert('내보낼 학생관찰 기록이 없습니다.'); return; }
    rows = [['학생이름','날짜','관찰내용']].concat(
      obs.slice().sort(function(a,b){ return b.date.localeCompare(a.date); })
         .map(function(o){ return [o.name, o.date, o.memo||'']; })
    );
    sheetName='학생관찰'; fileName='학생관찰_'+todayStr()+'.xlsx';
  } else if(type === 'parent') {
    if(!parentConsults.length){ alert('내보낼 부모상담 기록이 없습니다.'); return; }
    rows = [['학생이름','날짜','상담내용']].concat(
      parentConsults.slice().sort(function(a,b){ return b.date.localeCompare(a.date); })
                    .map(function(p){ return [p.name, p.date, p.content||'']; })
    );
    sheetName='부모상담'; fileName='부모상담_'+todayStr()+'.xlsx';
  } else if(type === 'note') {
    if(!notes.length){ alert('내보낼 노트가 없습니다.'); return; }
    rows = [['제목','내용','날짜']].concat(
      notes.map(function(n){ return [n.title||'(제목없음)', n.content||'', n.updatedAt?n.updatedAt.slice(0,10):'']; })
    );
    sheetName='노트'; fileName='노트_'+todayStr()+'.xlsx';
  }

  var ws = XLSX.utils.aoa_to_sheet(rows);
  /* 열 너비 자동 설정 */
  ws['!cols'] = rows[0].map(function(_,ci){
    var max = rows.reduce(function(m,r){ return Math.max(m, String(r[ci]||'').length); }, 10);
    return { wch: Math.min(max + 2, 60) };
  });
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, fileName);
}

function exportWord(type) {
  var title, bodyHtml, fileName;

  function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

  if(type === 'obs') {
    if(!obs.length){ alert('내보낼 학생관찰 기록이 없습니다.'); return; }
    title='학생관찰 기록'; fileName='학생관찰_'+todayStr()+'.doc';
    var sorted = obs.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });
    bodyHtml = sorted.map(function(o){
      return '<h3 style="color:#1c2340;margin:16px 0 4px">'+escHtml(o.name)+'&nbsp;<span style="font-size:12px;color:#888;font-weight:normal">'+o.date+'</span></h3>'+
             '<p style="margin:0 0 12px;line-height:1.7">'+escHtml(o.memo)+'</p><hr style="border:none;border-top:1px solid #ddd">';
    }).join('');
  } else if(type === 'parent') {
    if(!parentConsults.length){ alert('내보낼 부모상담 기록이 없습니다.'); return; }
    title='부모상담 기록'; fileName='부모상담_'+todayStr()+'.doc';
    var sorted = parentConsults.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });
    bodyHtml = sorted.map(function(p){
      return '<h3 style="color:#1c2340;margin:16px 0 4px">'+escHtml(p.name)+'&nbsp;<span style="font-size:12px;color:#888;font-weight:normal">'+p.date+'</span></h3>'+
             '<p style="margin:0 0 12px;line-height:1.7">'+escHtml(p.content)+'</p><hr style="border:none;border-top:1px solid #ddd">';
    }).join('');
  } else if(type === 'note') {
    if(!notes.length){ alert('내보낼 노트가 없습니다.'); return; }
    title='노트'; fileName='노트_'+todayStr()+'.doc';
    bodyHtml = notes.map(function(n){
      return (n.title?'<h3 style="color:#1c2340;margin:16px 0 4px">'+escHtml(n.title)+'</h3>':'')+
             '<p style="margin:0 0 4px;font-size:11px;color:#888">'+(n.updatedAt?n.updatedAt.slice(0,10):'')+'</p>'+
             '<p style="margin:0 0 12px;line-height:1.7">'+escHtml(n.content)+'</p><hr style="border:none;border-top:1px solid #ddd">';
    }).join('');
  }

  var html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">'+
    '<head><meta charset="UTF-8">'+

  var blob = new Blob(['﻿'+html], {type:'application/msword;charset=utf-8'});

  document.body.appendChild(a);

  URL.revokeObjectURL(a.href);
}

function closeOverlay(id){ document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.overlay').forEach(function(o){
  o.addEventListener('click', function(e){ if(e.target===this) closeOverlay(this.id); });
});
function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

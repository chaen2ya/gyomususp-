<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512">
  <defs>
    <style>@font-face{font-family:'OkDanDan';src:url('OkDanDan-Bold.ttf') format('truetype');}</style>
  </defs>
  <defs>
    <clipPath id="clip">
      <rect width="512" height="512" rx="80"/>
    </clipPath>
    <pattern id="tex" patternUnits="userSpaceOnUse" width="400" height="250">
      <image href="texture.png" width="400" height="250"/>
    </pattern>
  </defs>
  <!-- 둥근 사각형 배경 -->
  <rect width="512" height="512" rx="80" fill="black"/>
  <!-- 텍스처 패턴 (클립) -->
  <g clip-path="url(#clip)">
    <rect width="512" height="512" fill="url(#tex)"/>
  </g>
  <!-- 흰색 라벨 외곽 테두리 -->
  <rect x="72" y="166" width="368" height="210" rx="8" fill="white" stroke="#111" stroke-width="14"/>
  <!-- 흰색 라벨 내부 테두리 -->
  <rect x="90" y="184" width="332" height="174" rx="4" fill="white" stroke="#111" stroke-width="5"/>
  <!-- 교무수첩 텍스트 -->
  <text x="256" y="271" text-anchor="middle" dominant-baseline="middle"
    font-family="'OkDanDan',cursive"
    font-size="100" font-weight="400" fill="#111" letter-spacing="4">교무수첩</text>
</svg>
